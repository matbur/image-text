steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_FULL_NAME:$SHORT_SHA
      - --build-arg=COMMIT_SHA=$SHORT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_FULL_NAME:$SHORT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image=$_AR_HOSTNAME/$PROJECT_ID/cloud-run-source-deploy/$REPO_FULL_NAME:$SHORT_SHA
      - --region=$_DEPLOY_REGION
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
